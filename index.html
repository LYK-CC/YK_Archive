    <!-- Async Section Loader -->
    <script>
        const sections = [
            { id: 'about-section', file: '/sections/about.html' },
            { id: 'skills-section', file: '/sections/skills.html' },
            { id: 'resume-section', file: '/sections/resume.html' },
            { id: 'essays-section', file: '/sections/essays.html' },
            { id: 'initiatives-section', file: '/sections/initiatives.html' }
        ];

        sections.forEach(section => {
            fetch(section.file)
                .then(res => res.text())
                .then(html => {
                    const container = document.getElementById(section.id);
                    container.innerHTML = html;

                    if (typeof AOS !== 'undefined') AOS.refresh();
                    if (typeof PureCounter !== 'undefined') new PureCounter();

                    container.querySelectorAll('.typed').forEach(el => {
                        const strings = el.getAttribute("data-typed-items").split(",");
                        new Typed(el, {
                            strings: strings,
                            loop: true,
                            typeSpeed: 100,
                            backSpeed: 50,
                            backDelay: 2000
                        });
                    });

                    container.querySelectorAll('.skills-animation').forEach((item) => {
                        new Waypoint({
                            element: item,
                            offset: '80%',
                            handler: function () {
                                let progress = item.querySelectorAll('.progress .progress-bar');
                                progress.forEach(el => {
                                    el.style.width = el.getAttribute('aria-valuenow') + '%';
                                });
                            }
                        });
                    });
                })
                .catch(err => console.error(`Failed to load ${section.file}`, err));
        });
    </script>
